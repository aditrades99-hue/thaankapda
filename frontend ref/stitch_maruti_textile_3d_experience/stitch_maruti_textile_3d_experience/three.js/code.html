<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body>
<!-- STITCH_THREEJS_START:ANIMATION_14 class="fixed inset-0 w-full h-full bg-transparent" -->
<div class="fixed inset-0 w-full h-full bg-transparent" style="display:block;">
<script src="https://ajax.googleapis.com/ajax/libs/threejs/r125/three.min.js"></script>
<div id="threejs-container-ANIMATION_14" style="width:100%;height:100%"></div>
<script>
(function() {
  const container = document.getElementById('threejs-container-ANIMATION_14');
  const devicePixelRatio = window.devicePixelRatio || 1;
  
const width = container.clientWidth || window.innerWidth;
const height = container.clientHeight || window.innerHeight;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 1000);
camera.position.z = 5;

const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
renderer.setSize(width, height);
renderer.setPixelRatio(window.devicePixelRatio);
container.appendChild(renderer.domElement);

// Create a waving fabric roll (cylinder with displacement)
const geometry = new THREE.CylinderGeometry(1, 1, 4, 64, 64, true);
const material = new THREE.MeshPhongMaterial({
  color: 0x800020, // Royal Maroon
  side: THREE.DoubleSide,
  shininess: 100,
  specular: 0x444444
});

const fabric = new THREE.Mesh(geometry, material);
fabric.rotation.z = Math.PI / 4;
scene.add(fabric);

const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const pointLight = new THREE.PointLight(0xffd700, 1);
pointLight.position.set(5, 5, 5);
scene.add(pointLight);

function animate(t) {
  const time = t * 0.001;
  
  // Wave animation
  const position = geometry.attributes.position;
  for (let i = 0; i < position.count; i++) {
    const x = position.getX(i);
    const y = position.getY(i);
    const z = position.getZ(i);
    
    const wave = Math.sin(y * 2 + time) * 0.1;
    position.setZ(i, z + wave);
  }
  position.needsUpdate = true;
  
  fabric.rotation.y += 0.005;
  
  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}

window.addEventListener('resize', () => {
  const w = container.clientWidth;
  const h = container.clientHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
});

animate(0);

})();
</script>
</div>
<!-- STITCH_THREEJS_END:ANIMATION_14 -->
</body>
</html>
